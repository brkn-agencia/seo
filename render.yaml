services:
  - type: web
    name: seo-api
    runtime: node
    plan: starter
    buildCommand: npm install && npm run build:api
    startCommand: node apps/api/dist/index.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false
      - key: ENCRYPTION_KEY
        sync: false
      - key: TN_CLIENT_ID
        sync: false
      - key: TN_CLIENT_SECRET
        sync: false
      - key: APP_URL
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false

  - type: static
    name: seo-web
    buildCommand: npm install && npm run build --workspace=apps/web
    staticPublishPath: apps/web/dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
