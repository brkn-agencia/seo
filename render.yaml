services:
  - type: web
    name: seo-api
    runtime: node
    plan: starter
    buildCommand: npm install && npm run build:api
    startCommand: npm run start --workspace=apps/api
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false
      - key: ENCRYPTION_KEY
        sync: false
      - key: TN_CLIENT_ID
        sync: false
      - key: TN_CLIENT_SECRET
        sync: false

  - type: worker
    name: seo-worker
    runtime: node
    plan: starter
    buildCommand: npm install && npm run build:api
    startCommand: node apps/api/dist/worker.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false
      - key: ENCRYPTION_KEY
        sync: false
